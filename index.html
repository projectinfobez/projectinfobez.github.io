<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4 font-sans">
    <div id="app-container" class="w-full max-w-md bg-gray-800 rounded-2xl shadow-2xl overflow-hidden border border-gray-700">
        
        <div id="start-screen" class="hidden p-8 text-center space-y-6">
            <h1 class="text-3xl font-bold text-blue-400 mb-2">Кибербезопасность</h1>
            <p class="text-gray-300">Проверьте свои знания о защите данных и безопасном поведении в сети.</p>
            <button onclick="startQuiz()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl transition duration-200 transform hover:scale-105">
                Начать тест
            </button>
        </div>

        <div id="quiz-screen" class="hidden p-6 space-y-6">
            <div class="flex justify-between items-center text-sm text-gray-400 mb-2">
                <span id="question-counter">Вопрос 1/10</span>
                <span id="score-display" class="hidden">Баллы: 0</span>
                <span id="timer-display" class="font-mono text-yellow-400 ml-auto">00:00</span>
            </div>
            
            <div class="w-full bg-gray-700 rounded-full h-2.5 mb-6">
                <div id="progress-bar" class="bg-blue-500 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>

            <h2 id="question-text" class="text-xl font-semibold leading-relaxed"></h2>

            <div id="options-container" class="space-y-3">
            </div>
        </div>

        <div id="result-screen" class="hidden p-8 text-center space-y-6">
            <div class="mb-4">
                <svg class="w-20 h-20 mx-auto text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h2 class="text-3xl font-bold text-white">Тест завершен!</h2>
            <div class="bg-gray-700 rounded-xl p-6 space-y-4">
                <div>
                    <p class="text-gray-300 mb-1">Ваш результат:</p>
                    <p id="final-score" class="text-4xl font-bold text-blue-400">0 / 10</p>
                </div>
                <div class="border-t border-gray-600 pt-4">
                    <p class="text-gray-300 mb-1">Затраченное время:</p>
                    <p id="final-time" class="text-2xl font-bold text-yellow-400">00:00</p>
                </div>
                <div class="border-t border-gray-600 pt-4 grid grid-cols-2 gap-4 text-sm">
                    <div>
                        <p class="text-gray-400">Лучший балл:</p>
                        <p id="best-score-val" class="text-lg font-bold text-white">0</p>
                    </div>
                    <div>
                        <p class="text-gray-400">Лучшее время:</p>
                        <p id="best-time-val" class="text-lg font-bold text-white">--:--</p>
                    </div>
                </div>
                <p id="attempts-count" class="text-xs text-gray-500 mt-2">Пройдено раз: 0</p>
            </div>
            <button onclick="restartQuiz()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl transition duration-200">
                Пройти заново
            </button>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
